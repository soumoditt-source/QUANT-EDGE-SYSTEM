services:
  - type: web
    name: quantedge-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../cpp && pip install pybind11 && python setup.py build_ext --inplace
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MISTRAL_API_KEY
        sync: false
